<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나는 솔로 시청 파티 초대장</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(180deg, #4a3a8a 0%, #7b5ea7 30%, #c78db5 60%, #9a7cc5 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Floating emoji container */
    .floating-emojis {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .emoji {
      position: absolute;
      font-size: 28px;
      animation: floatEmoji 8s ease-in-out infinite;
      opacity: 0.85;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      25% { transform: translateY(-20px) rotate(10deg) scale(1.05); }
      50% { transform: translateY(-35px) rotate(-5deg) scale(1.1); }
      75% { transform: translateY(-15px) rotate(8deg) scale(1.02); }
    }

    /* Badge top-right */
    .badge {
      position: absolute;
      top: 24px;
      right: 24px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      z-index: 10;
      animation: fadeSlideIn 1s ease-out 0.3s both;
    }

    /* Main content */
    .main-content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px 40px;
      max-width: 800px;
      width: 100%;
    }

    .title {
      font-size: clamp(64px, 12vw, 120px);
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
      animation: titlePop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      margin-bottom: 20px;
    }

    .title span {
      display: inline-block;
    }

    @keyframes titlePop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .subtitle {
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 400;
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 0.5s both;
      margin-bottom: 36px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    @keyframes fadeSlideIn {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* Buttons */
    .buttons {
      display: flex;
      gap: 16px;
      margin-bottom: 36px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 0.8s both;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-watch {
      background: linear-gradient(135deg, #56d4c8 0%, #48c9b0 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(72, 201, 176, 0.4);
    }

    .btn-chat {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(238, 90, 36, 0.4);
    }

    /* Notification count */
    .notification-count {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 1s both;
    }

    .notification-count span {
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 12px;
    }

    /* Info card */
    .info-card {
      background: linear-gradient(135deg, rgba(30, 20, 60, 0.85) 0%, rgba(50, 30, 80, 0.8) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(168, 240, 230, 0.25);
      border-radius: 20px;
      padding: 30px 34px;
      max-width: 500px;
      width: 100%;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 1.2s both;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .info-card h3 {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 18px;
      background: linear-gradient(90deg, #ffd93d, #ff6bb5, #a8f0e6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .info-card ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .info-card ul li {
      font-size: 15px;
      padding: 8px 14px;
      line-height: 1.6;
      color: #e8e0f0;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      transition: background 0.2s, transform 0.2s;
    }

    .info-card ul li:hover {
      background: rgba(255,255,255,0.12);
      transform: translateX(4px);
    }

    .info-card ul li .li-emoji {
      margin-right: 8px;
      font-size: 17px;
    }

    .coupang-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      margin-top: 18px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
      text-decoration: none;
    }

    .coupang-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 20px rgba(231, 76, 60, 0.5);
    }

    .coupang-btn .play-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      font-size: 12px;
    }

    /* Sponsors */
    .sponsors {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 28px;
      padding: 28px 20px;
      border-top: 1px solid rgba(255,255,255,0.15);
      width: 100%;
      max-width: 900px;
      opacity: 0;
      animation: fadeSlideIn 0.8s ease-out 1.5s both;
    }

    .sponsor {
      font-size: 14px;
      font-weight: 700;
      opacity: 0.7;
      letter-spacing: 1px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sponsor-icon {
      font-size: 18px;
    }

    /* Pulse glow on title */
    .title {
      animation: titlePop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 glowPulse 3s ease-in-out 1.5s infinite;
    }

    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 4px 20px rgba(0,0,0,0.3); }
      50% { text-shadow: 0 4px 40px rgba(168, 240, 230, 0.4), 0 4px 20px rgba(0,0,0,0.3); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .badge {
        top: 12px;
        right: 12px;
        font-size: 12px;
        padding: 8px 14px;
      }
      .btn {
        padding: 12px 24px;
        font-size: 16px;
      }
      .info-card {
        padding: 20px 20px;
      }
      .sponsors {
        gap: 16px;
      }
      .sponsor {
        font-size: 12px;
      }
    }

    /* Sparkle animation for background */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      animation: sparkle 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }

    /* Confetti explosion */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 1;
    }

    .confetti.square { border-radius: 2px; }
    .confetti.circle { border-radius: 50%; }
    .confetti.strip { width: 6px; height: 16px; border-radius: 2px; }
    .confetti.heart::before {
      content: '';
      display: block;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50% 50% 0 0;
      transform: rotate(-45deg);
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotate(0deg) scale(1);
        opacity: 1;
      }
      80% {
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg) scale(0.3);
        opacity: 0;
      }
    }

    /* Count pulse */
    .count-bump {
      animation: countBump 0.3s ease-out;
    }

    @keyframes countBump {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); color: #a8f0e6; }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Floating emojis -->
  <div class="floating-emojis" id="floatingEmojis"></div>

  <!-- Badge -->
  <div class="badge">솔로 라이프 시청 파티</div>

  <!-- Main content -->
  <div class="main-content">
    <h1 class="title">나는<br>솔로</h1>
    <p class="subtitle">수요일 밤 10시 30분, 본방사수!</p>

    <div class="buttons">
      <button class="btn btn-watch" onclick="launchConfetti(this)">
        <span>💚</span> 함께보기
      </button>
      <button class="btn btn-chat" onclick="alert('실시간 소통 링크를 설정해주세요!')">
        <span>💬</span> 실시간 소통
      </button>
    </div>

    <div class="notification-count">
      <span>본방 알림 신청 2,728명</span>
    </div>

    <div class="info-card">
      <h3>💘 나는솔로 진심인 사람들을 위한 모임 💘</h3>
      <ul>
        <li><span class="li-emoji">🔥</span>수요일 밤의 뜨거운 열기를 함께</li>
        <li><span class="li-emoji">🔍</span>최신 기수 분석 및 토론</li>
        <li><span class="li-emoji">💬</span>실시간 코멘트 공유</li>
        <li><span class="li-emoji">🍽️</span>정성스러운 식사 제공</li>
      </ul>
      <div class="coupang-btn">
        <span class="play-icon">▶</span> 쿠팡플레이 실시간 시청
      </div>
    </div>

    <div class="sponsors">
      <div class="sponsor"><span class="sponsor-icon">🌹</span> 솔로 문화 협회</div>
      <div class="sponsor">MEDIA HUB{}</div>
      <div class="sponsor"><strong>HUB E</strong></div>
      <div class="sponsor"><strong>HUB S</strong></div>
      <div class="sponsor">GOLDEN ROSE</div>
      <div class="sponsor">K-CONTENT PRODUCTION</div>
      <div class="sponsor">🏢 동천 유타워</div>
      <div class="sponsor">📶 곽두팔 와이파이</div>
    </div>
  </div>

  <script>
    // Emoji configuration
    const emojiData = [
      { emoji: '📺', x: 8, y: 8, delay: 0 },
      { emoji: '💗', x: 12, y: 25, delay: 1.2 },
      { emoji: '🌹', x: 5, y: 50, delay: 2.5 },
      { emoji: '🌹', x: 85, y: 15, delay: 0.8 },
      { emoji: '🌹', x: 15, y: 75, delay: 3.2 },
      { emoji: '⭐', x: 88, y: 8, delay: 1.5 },
      { emoji: '⭐', x: 75, y: 25, delay: 3 },
      { emoji: '💗', x: 92, y: 40, delay: 0.5 },
      { emoji: '⚡', x: 90, y: 55, delay: 2 },
      { emoji: '⚡', x: 82, y: 70, delay: 3.5 },
      { emoji: '🔥', x: 88, y: 50, delay: 1 },
      { emoji: '💧', x: 78, y: 60, delay: 2.8 },
      { emoji: '👑', x: 80, y: 30, delay: 1.8 },
      { emoji: '💜', x: 20, y: 40, delay: 0.3 },
      { emoji: '✨', x: 92, y: 80, delay: 2.2 },
      { emoji: '🌹', x: 10, y: 65, delay: 1.6 },
      { emoji: '💫', x: 50, y: 85, delay: 3.8 },
      { emoji: '💗', x: 55, y: 90, delay: 0.7 },
      { emoji: '⭐', x: 40, y: 88, delay: 2.6 },
    ];

    const container = document.getElementById('floatingEmojis');

    emojiData.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'emoji';
      el.textContent = item.emoji;
      el.style.left = item.x + '%';
      el.style.top = item.y + '%';
      el.style.animationDelay = item.delay + 's';
      el.style.animationDuration = (6 + Math.random() * 4) + 's';
      container.appendChild(el);
    });

    // Add sparkles
    for (let i = 0; i < 20; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      sparkle.style.animationDelay = Math.random() * 3 + 's';
      sparkle.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      container.appendChild(sparkle);
    }

    // Continuously increasing notification count
    const countEl = document.querySelector('.notification-count span');
    let currentCount = 2728;

    // Initial count-up animation from 0 to 2728
    const initialDuration = 2000;
    const initialStart = performance.now();

    function animateInitialCount(now) {
      const elapsed = now - initialStart;
      const progress = Math.min(elapsed / initialDuration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const displayCount = Math.floor(eased * currentCount);
      countEl.textContent = `본방 알림 신청 ${displayCount.toLocaleString()}명`;
      if (progress < 1) {
        requestAnimationFrame(animateInitialCount);
      } else {
        // After initial animation, start continuous increment
        startContinuousCount();
      }
    }

    function startContinuousCount() {
      setInterval(() => {
        const increment = Math.floor(Math.random() * 5) + 1;
        currentCount += increment;
        countEl.textContent = `본방 알림 신청 ${currentCount.toLocaleString()}명`;
        countEl.classList.remove('count-bump');
        void countEl.offsetWidth; // force reflow
        countEl.classList.add('count-bump');
      }, 1500 + Math.random() * 2000);
    }

    setTimeout(() => requestAnimationFrame(animateInitialCount), 1500);

    // Confetti explosion
    function launchConfetti(btnEl) {
      const rect = btnEl.getBoundingClientRect();
      const originX = rect.left + rect.width / 2;
      const originY = rect.top + rect.height / 2;

      const container = document.createElement('div');
      container.className = 'confetti-container';
      document.body.appendChild(container);

      const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bb5', '#a855f7', '#56d4c8', '#ff9f43'];
      const shapes = ['square', 'circle', 'strip'];
      const total = 80;

      for (let i = 0; i < total; i++) {
        const confetti = document.createElement('div');
        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        confetti.className = `confetti ${shape}`;
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.left = originX + 'px';
        confetti.style.top = originY + 'px';

        const angle = (Math.random() * 360) * (Math.PI / 180);
        const velocity = 200 + Math.random() * 400;
        const dx = Math.cos(angle) * velocity;
        const dy = Math.sin(angle) * velocity - 200;
        const rotation = Math.random() * 1080 - 540;
        const duration = 1.2 + Math.random() * 1.5;
        const size = 6 + Math.random() * 10;

        confetti.style.width = size + 'px';
        confetti.style.height = (shape === 'strip' ? size * 2.5 : size) + 'px';

        confetti.animate([
          {
            transform: 'translate(0, 0) rotate(0deg) scale(1)',
            opacity: 1
          },
          {
            transform: `translate(${dx}px, ${dy + 600}px) rotate(${rotation}deg) scale(0.2)`,
            opacity: 0
          }
        ], {
          duration: duration * 1000,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
          fill: 'forwards'
        });

        container.appendChild(confetti);
      }

      // Button pulse effect
      btnEl.style.transform = 'scale(1.15)';
      setTimeout(() => { btnEl.style.transform = ''; }, 200);

      // Cleanup
      setTimeout(() => container.remove(), 4000);
    }
  </script>
</body>
</html>
